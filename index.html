<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI App Launcher</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#f7f5f2">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/icons/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/icons/apple-touch-icon.png">
  <style>
    :root {
      --bg: #f7f5f2;
      --text: #2a2a2a;
      --card-shadow: 0 12px 30px rgba(0,0,0,.10);
      --pink: #ea4f97;
      --pink-soft: #f7d7e7;
      --green: #1cab42;
      --green-soft: #dff4e1;
      --orange: #e68a21;
      --orange-soft: #fde5bf;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 18%, rgba(247,218,230,.45), transparent 28%),
        radial-gradient(circle at 85% 82%, rgba(214,243,214,.55), transparent 25%),
        linear-gradient(180deg, #fbfaf8 0%, var(--bg) 100%);
      min-height: 100vh;
    }
    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }
    .stage {
      container-type: inline-size;
      position: relative;
      width: min(1220px, calc(100vw - 36px), calc((100vh - 72px) * 1.58));
      aspect-ratio: 1.58 / 1;
      background: rgba(255,255,255,.52);
      border: 1px solid rgba(255,255,255,.7);
      box-shadow: 0 20px 50px rgba(0,0,0,.08);
      border-radius: 36px;
      overflow: hidden;
      backdrop-filter: blur(6px);
      padding: 18px;
    }
    .sparkle {
      position: absolute;
      width: 14px;
      height: 14px;
      background: linear-gradient(135deg, #fff1b1, #ffd15c);
      clip-path: polygon(50% 0%, 62% 38%, 100% 50%, 62% 62%, 50% 100%, 38% 62%, 0% 50%, 38% 38%);
      opacity: .8;
    }
    .center-figure {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-48%, -44%);
      width: min(48%, 620px);
      z-index: 5;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.08));
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }
    .card {
      position: absolute;
      display: block;
      text-decoration: none;
      color: inherit;
      z-index: 6;
      transition: transform .18s ease, box-shadow .18s ease;
      outline: none;
    }
    .card:hover,
    .card:focus-visible {
      transform: translateY(-4px) scale(1.01);
    }
    .card-inner {
      width: 100%;
      background: rgba(255,255,255,.84);
      border-radius: 24px;
      box-shadow: var(--card-shadow);
      padding: 11px 11px 10px;
      border: 1px solid rgba(255,255,255,.95);
    }
    .card img.icon {
      width: 100%;
      display: block;
      border-radius: 16px;
      user-select: none;
      -webkit-user-drag: none;
    }
    .label {
      margin-top: 8px;
      text-align: center;
      font-size: clamp(13px, 1.55cqw, 22px);
      font-weight: 800;
      line-height: 1.18;
      letter-spacing: -.02em;
      padding: 10px 10px;
      border-radius: 16px;
      white-space: normal;
      word-break: break-word;
    }
    .card.cooking { left: 8.5%; top: 27%; width: min(17%, 215px); z-index: 6; }
    .card.cooking .label { background: var(--orange-soft); color: #6c3a00; }

    .card.cosme { right: 17.8%; top: 10.5%; width: min(14.2%, 180px); }
    .card.cosme .label { background: var(--pink-soft); color: #7a284b; }

    .card.gut { right: 16.2%; bottom: 9%; width: min(14.2%, 180px); }
    .card.gut .label { background: var(--green-soft); color: #13682c; }

    .arrow-layer {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }
    .hint {
      position: absolute;
      left: 50%;
      top: 3%;
      transform: translateX(-50%);
      background: rgba(255,255,255,.82);
      color: #555;
      font-weight: 700;
      padding: 10px 16px;
      border-radius: 999px;
      box-shadow: 0 8px 20px rgba(0,0,0,.06);
      z-index: 8;
      font-size: clamp(13px, 1.15vw, 18px);
      text-align: center;
      max-width: calc(100% - 24px);
    }

    @media (max-width: 1000px) {
      .center-figure { width: min(48%, 560px); transform: translate(-48%, -44%); }
      .card.cooking { width: min(18%, 210px); }
      .card.cosme, .card.gut { width: min(14.2%, 168px); }
      .label { font-size: clamp(14px, 1.15vw, 20px); }
    }


    @media (orientation: portrait) {
      .page { align-items: center; padding: 12px; }
      .stage { width: 100%; }
      .hint { top: 3%; font-size: clamp(10px, 2.5cqw, 16px); }
      .label { font-size: clamp(10px, 2.5cqw, 18px); padding: 4px 6px; }
      .card-inner { padding: 6px; }
    }

    
  </style>
</head>
